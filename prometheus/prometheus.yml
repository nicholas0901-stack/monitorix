global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Spring Boot agent metrics
  - job_name: 'monitorix-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['agent:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'monitorix-agent'

  # Scrape Docker host metrics (cadvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Node exporter for host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']