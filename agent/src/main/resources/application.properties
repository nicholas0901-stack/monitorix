spring.application.name=monitorix-agent
server.port=8080

# Expose all actuator endpoints including prometheus
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

# App info shown in actuator/info
info.app.name=Monitorix Agent
info.app.version=1.0.0
info.app.description=Infrastructure monitoring agent

# Logging
logging.level.com.monitorix=DEBUG

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

