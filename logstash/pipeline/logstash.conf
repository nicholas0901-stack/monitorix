input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
  }
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "monitorix-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}